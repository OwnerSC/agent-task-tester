<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Task Tester PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b1f1f);
    color: white;
}

/* SAMOLOT TŁO */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('https://images.unsplash.com/photo-1506015391300-4802dc74de2e') center/cover no-repeat;
    opacity: 0.12;
    z-index: -1;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card {
    background: rgba(30,30,40,0.92);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

button {
    padding: 10px 14px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.correct { background: #4caf50; color: white; }
.incorrect { background: #f44336; color: white; }
.next { background: #ff9800; }
.danger { background: #b71c1c; color: white; }

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #444;
    text-align: center;
}

h1, h2 { color: #ffcc80; }

.stats {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
}

.statBox {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 10px;
    margin: 5px;
    flex: 1;
    text-align: center;
}
</style>
</head>

<body>
<div class="container">

<h1>Agent Task Tester PRO</h1>

<div class="card">
    <h2 id="question">Ładowanie...</h2>

    <button class="correct" onclick="answer(true)">Correct</button>
    <button class="incorrect" onclick="answer(false)">Incorrect</button>
    <button class="next" onclick="nextQuestion()">Next</button>
</div>

<div class="card stats">
    <div class="statBox">
        Correct<br><span id="cCount">0</span>
    </div>
    <div class="statBox">
        Incorrect<br><span id="iCount">0</span>
    </div>
    <div class="statBox">
        Accuracy<br><span id="acc">0%</span>
    </div>
    <div class="statBox">
        Level<br><span id="lvl">1</span>
    </div>
</div>

<div class="card">
    <h2>Wykres wyników</h2>
    <canvas id="barChart"></canvas>
</div>

<div class="card">
    <h2>Postęp (czas)</h2>
    <canvas id="lineChart"></canvas>
</div>

<div class="card">
    <h2>Historia testów</h2>
    <button class="danger" onclick="clearAll()">Usuń wszystko</button>
    <table>
        <thead>
            <tr>
                <th>Test</th>
                <th>Correct</th>
                <th>Incorrect</th>
                <th>%</th>
                <th>Usuń</th>
            </tr>
        </thead>
        <tbody id="historyTable"></tbody>
    </table>
</div>

</div>

<script>
let questions = [
    "Czy system działa poprawnie?",
    "Czy odpowiedź była logiczna?",
    "Czy wynik jest zgodny?",
    "Czy UI działa stabilnie?"
];

let index = 0;

let data = JSON.parse(localStorage.getItem("testerData")) || {
    correct: 0,
    incorrect: 0,
    history: []
};

document.getElementById("question").innerText = questions[index];

function save() {
    localStorage.setItem("testerData", JSON.stringify(data));
}

function calcAcc() {
    let total = data.correct + data.incorrect;
    return total === 0 ? 0 : Math.round((data.correct / total) * 100);
}

function calcLevel() {
    return Math.floor((data.correct + data.incorrect) / 5) + 1;
}

function answer(isCorrect) {
    if (isCorrect) data.correct++;
    else data.incorrect++;

    save();
    updateUI();
}

function nextQuestion() {
    index = (index + 1) % questions.length;
    document.getElementById("question").innerText = questions[index];

    data.history.push({
        id: Date.now(),
        correct: data.correct,
        incorrect: data.incorrect,
        acc: calcAcc()
    });

    save();
    updateUI();
}

function deleteItem(id) {
    data.history = data.history.filter(h => h.id !== id);
    save();
    updateUI();
}

function clearAll() {
    data = { correct: 0, incorrect: 0, history: [] };
    save();
    updateUI();
}

function updateUI() {
    document.getElementById("cCount").innerText = data.correct;
    document.getElementById("iCount").innerText = data.incorrect;
    document.getElementById("acc").innerText = calcAcc() + "%";
    document.getElementById("lvl").innerText = calcLevel();

    renderTable();
    renderCharts();
}

function renderTable() {
    let tbody = document.getElementById("historyTable");
    tbody.innerHTML = "";

    data.history.forEach(h => {
        let row = `<tr>
            <td>${h.id}</td>
            <td>${h.correct}</td>
            <td>${h.incorrect}</td>
            <td>${h.acc}%</td>
            <td><button class="danger" onclick="deleteItem(${h.id})">X</button></td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

/* WYKRESY */
let barChart, lineChart;

function renderCharts() {
    if (barChart) barChart.destroy();
    if (lineChart) lineChart.destroy();

    barChart = new Chart(document.getElementById("barChart"), {
        type: "bar",
        data: {
            labels: ["Correct", "Incorrect"],
            datasets: [{
                data: [data.correct, data.incorrect],
                backgroundColor: ["#4caf50", "#f44336"]
            }]
        }
    });

    lineChart = new Chart(document.getElementById("lineChart"), {
        type: "line",
        data: {
            labels: data.history.map((_, i) => "Test " + (i+1)),
            datasets: [{
                label: "Accuracy %",
                data: data.history.map(h => h.acc),
                borderColor: "#ffcc80",
                fill: false
            }]
        }
    });
}

updateUI();
</script>

</body>
</html>
