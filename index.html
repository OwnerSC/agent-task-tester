<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Agentów PRO</title>

<style>

body{
    font-family:Segoe UI;
    margin:20px;
    background-image:url("https://images.unsplash.com/photo-1506015391300-4802dc74de2e");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:#222;
}

.overlay{
    background:rgba(255,255,255,0.85);
    padding:20px;
    border-radius:12px;
}

button,input,select{
    padding:8px;
    margin:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#2c3e50;
    color:white;
}

/* warm colors */
.good{
    color:#2e7d32;
    background:#e8f5e9;
    padding:3px 6px;
    border-radius:6px;
    font-weight:bold;
}

.mid{
    color:#b26a00;
    background:#fff3e0;
    padding:3px 6px;
    border-radius:6px;
    font-weight:bold;
}

.bad{
    color:#c62828;
    background:#ffebee;
    padding:3px 6px;
    border-radius:6px;
    font-weight:bold;
}

.zero{
    color:#546e7a;
    background:#eceff1;
    padding:3px 6px;
    border-radius:6px;
}

</style>
</head>

<body>

<div class="overlay">

<h2>Panel Agentów PRO</h2>

<button onclick="viewMode='agent';render()">Agenci</button>
<button onclick="viewMode='test';render()">Testy</button>
<button onclick="viewMode='matrix';render()">Matrix</button>

<br>

<input id="agent" placeholder="Agent">
<input id="task" placeholder="Zadanie">
<input id="testNr" placeholder="Test nr">
<select id="status">
<option>Correct</option>
<option>Incorrect</option>
</select>

<button onclick="addTask()">Dodaj</button>

<input id="search" oninput="render()" placeholder="Szukaj...">

<table>
<thead>
<tr id="header"></tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let viewMode = "agent";

function save(){
localStorage.setItem("tasks", JSON.stringify(tasks));
}

function clean(t){
return {
id: t.id || Date.now(),
agent: (t.agent||"").trim(),
task: (t.task||"").trim(),
test: (t.test||"1").trim(),
status: (t.status||"Incorrect").trim()
};
}

function rate(ok,total){
ok = Number(ok) || 0;
total = Number(total) || 0;
if(total === 0) return 0;
return Math.round((ok / total) * 100);
}

function toggle(id){
let el = document.getElementById(id);
if(el) el.style.display = el.style.display === "none" ? "table-row" : "none";
}

function addTask(){

tasks.push(clean({
agent: agent.value,
task: task.value,
test: testNr.value,
status: status.value
}));

save();
render();
}

function render(){

let data = tasks.map(clean);

let s = search.value.toLowerCase();
if(s){
data = data.filter(t =>
t.agent.toLowerCase().includes(s) ||
t.task.toLowerCase().includes(s)
);
}

let html = "";
let header = "";

/* AGENT VIEW */
if(viewMode === "agent"){

header = `<th>Agent</th><th>Total</th><th>OK</th><th>BAD</th><th>%</th>`;

let g = {};

data.forEach(t=>{
if(!g[t.agent]) g[t.agent] = {tasks:[], ok:0, bad:0};
g[t.agent].tasks.push(t);
t.status === "Correct" ? g[t.agent].ok++ : g[t.agent].bad++;
});

Object.keys(g).forEach(a=>{

let total = g[a].ok + g[a].bad;
let r = rate(g[a].ok, total);

html += `
<tr onclick="toggle('a-${a}')" style="cursor:pointer;background:${r>=75?'#e8f5e9':r>=40?'#fff3e0':'#ffebee'}">
<td><b>${a}</b></td>
<td>${total}</td>
<td>${g[a].ok}</td>
<td>${g[a].bad}</td>
<td>${r}%</td>
</tr>

<tr id="a-${a}" style="display:none">
<td colspan="5">
`;

g[a].tasks.forEach(t=>{
html += `
<div>
Test ${t.test} -
<span class="${t.status==='Correct'?'good':'bad'}">
${t.status}
</span>
 ${t.task}
</div>`;
});

html += `</td></tr>`;
});
}

/* TEST VIEW */
if(viewMode === "test"){

header = `<th>Test</th><th>Total</th><th>OK</th><th>BAD</th><th>%</th>`;

let g = {};

data.forEach(t=>{
if(!g[t.test]) g[t.test] = {tasks:[], ok:0, bad:0};
g[t.test].tasks.push(t);
t.status === "Correct" ? g[t.test].ok++ : g[t.test].bad++;
});

Object.keys(g).forEach(t=>{

let total = g[t].ok + g[t].bad;
let r = rate(g[t].ok, total);

html += `
<tr onclick="toggle('t-${t}')" style="cursor:pointer;background:${r>=75?'#e8f5e9':r>=40?'#fff3e0':'#ffebee'}">
<td><b>Test ${t}</b></td>
<td>${total}</td>
<td>${g[t].ok}</td>
<td>${g[t].bad}</td>
<td>${r}%</td>
</tr>

<tr id="t-${t}" style="display:none">
<td colspan="5">
`;

g[t].tasks.forEach(x=>{
html += `
<div>
${x.agent} -
<span class="${x.status==='Correct'?'good':'bad'}">
${x.status}
</span>
 ${x.task}
</div>`;
});

html += `</td></tr>`;
});
}

/* MATRIX VIEW */
if(viewMode === "matrix"){

let m = {};

data.forEach(t=>{
if(!m[t.agent]) m[t.agent] = {};
if(!m[t.agent][t.test]) m[t.agent][t.test] = {ok:0,total:0};

m[t.agent][t.test].total++;
if(t.status === "Correct") m[t.agent][t.test].ok++;
});

let tests = [...new Set(data.map(t=>t.test))].sort();

header = `<th>Agent</th>` + tests.map(t=>`<th>Test ${t}</th>`).join("");

Object.keys(m).forEach(a=>{
html += `<tr><td><b>${a}</b></td>`;

tests.forEach(t=>{
let c = m[a][t];
if(!c){
html += `<td>0%</td>`;
return;
}

let r = rate(c.ok, c.total);

let dot = "red";
if(r >= 75) dot = "green";
else if(r >= 40) dot = "orange";

html += `<td>${dot} ${r}%</td>`;
});

html += `</tr>`;
});
}

document.getElementById("header").innerHTML = header;
document.getElementById("table").innerHTML = html;

}

render();

</script>

</body>
</html>
