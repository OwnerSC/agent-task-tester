<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Task Tester PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b1f1f);
    color: white;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url('https://images.unsplash.com/photo-1506015391300-4802dc74de2e') center/cover no-repeat;
    opacity: 0.12;
    z-index: -1;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card {
    background: rgba(30,30,40,0.92);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

button {
    padding: 10px 14px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.ok { background: #4caf50; color: white; }
.bad { background: #f44336; color: white; }
.next { background: #ff9800; }
.danger { background: #b71c1c; color: white; }

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #444;
    text-align: center;
}
</style>
</head>

<body>
<div class="container">

<h1>Agent Task Tester PRO</h1>

<div class="card">
    <h2 id="question"></h2>

    <button class="ok" onclick="mark('correct')">OK / CORRECT</button>
    <button class="bad" onclick="mark('incorrect')">BAD / INCORRECT</button>
    <button class="next" onclick="nextQuestion()">NEXT</button>
</div>

<div class="card">
    <h3>Stats</h3>
    <p>Correct: <span id="c"></span></p>
    <p>Incorrect: <span id="i"></span></p>
    <p>Accuracy: <span id="a"></span>%</p>
    <p>Level: <span id="l"></span></p>
</div>

<div class="card">
    <h3>Wykres</h3>
    <canvas id="chart1"></canvas>
</div>

<div class="card">
    <h3>Historia</h3>
    <button class="danger" onclick="clearAll()">USUŃ WSZYSTKO</button>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Correct</th>
                <th>Incorrect</th>
                <th>%</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="history"></tbody>
    </table>
</div>

</div>

<script>
const questions = [
    "Czy system działa poprawnie?",
    "Czy odpowiedź jest logiczna?",
    "Czy wynik się zgadza?",
    "Czy UI działa stabilnie?"
];

let qIndex = 0;

let data = JSON.parse(localStorage.getItem("data")) || {
    correct: 0,
    incorrect: 0,
    history: []
};

document.getElementById("question").innerText = questions[qIndex];

function save() {
    localStorage.setItem("data", JSON.stringify(data));
}

function accuracy() {
    let t = data.correct + data.incorrect;
    return t === 0 ? 0 : Math.round((data.correct / t) * 100);
}

function level() {
    return Math.floor((data.correct + data.incorrect) / 5) + 1;
}

function mark(type) {
    if (type === "correct") data.correct++;
    if (type === "incorrect") data.incorrect++;

    save();
    update();
}

function nextQuestion() {
    qIndex = (qIndex + 1) % questions.length;
    document.getElementById("question").innerText = questions[qIndex];

    data.history.push({
        id: Date.now(),
        correct: data.correct,
        incorrect: data.incorrect,
        acc: accuracy()
    });

    save();
    update();
}

function deleteItem(id) {
    data.history = data.history.filter(x => x.id !== id);
    save();
    update();
}

function clearAll() {
    data = { correct: 0, incorrect: 0, history: [] };
    save();
    update();
}

let chart;

function updateChart() {
    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart1"), {
        type: "bar",
        data: {
            labels: ["Correct", "Incorrect"],
            datasets: [{
                data: [data.correct, data.incorrect],
                backgroundColor: ["#4caf50", "#f44336"]
            }]
        }
    });
}

function updateTable() {
    let html = "";

    data.history.forEach(h => {
        html += `
        <tr>
            <td>${h.id}</td>
            <td>${h.correct}</td>
            <td>${h.incorrect}</td>
            <td>${h.acc}%</td>
            <td><button class="danger" onclick="deleteItem(${h.id})">X</button></td>
        </tr>`;
    });

    document.getElementById("history").innerHTML = html;
}

function updateStats() {
    document.getElementById("c").innerText = data.correct;
    document.getElementById("i").innerText = data.incorrect;
    document.getElementById("a").innerText = accuracy();
    document.getElementById("l").innerText = level();
}

function update() {
    updateStats();
    updateTable();
    updateChart();
}

update();
</script>

</body>
</html>
