<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Agentów PRO</title>

<style>
body{
    font-family:Segoe UI;
    margin:20px;
    background:#f4f7f6;
}

h2{margin-bottom:10px}

button,input,select{
    padding:8px;
    margin:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#2c3e50;
    color:white;
}

/* 🌈 kolory statusów */
.good{color:#1e8e3e;font-weight:bold}
.mid{color:#f39c12;font-weight:bold}
.bad{color:#c0392b;font-weight:bold}
.zero{color:#7f8c8d;font-weight:bold}

.card{
    background:white;
    padding:10px;
    margin-top:10px;
}

.dot{
    font-size:16px;
}
</style>
</head>

<body>

<h2>📊 Panel Agentów PRO (PL)</h2>

<button onclick="viewMode='agent';render()">👤 Agenci</button>
<button onclick="viewMode='test';render()">🧪 Testy</button>
<button onclick="viewMode='matrix';render()">🟢 Macierz</button>

<br>

<input id="agent" placeholder="Agent">
<input id="task" placeholder="Zadanie">
<input id="testNr" placeholder="Test nr (np. 1)">
<select id="status">
<option>Correct</option>
<option>Incorrect</option>
</select>

<button onclick="addTask()">Dodaj</button>

<input id="search" oninput="render()" placeholder="Szukaj...">

<table>
<thead>
<tr id="header"></tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let viewMode = "agent";

function save(){
localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask(){

tasks.push({
id:Date.now(),
agent:agent.value.trim(),
task:task.value.trim(),
test:testNr.value.trim() || "1",
status:status.value
});

save();
render();
}

function toggle(id){
let el = document.getElementById(id);
if(el) el.style.display = el.style.display==="none"?"table-row":"none";
}

function calcRate(ok,total){
if(!total || total===0) return 0;
return Math.round((ok/total)*100);
}

function color(rate){
if(rate>=75) return "good";
if(rate>=40) return "mid";
if(rate>0) return "bad";
return "zero";
}

function render(){

let data = [...tasks];

let s = search.value.toLowerCase();
if(s){
data = data.filter(t =>
t.agent.toLowerCase().includes(s) ||
t.task.toLowerCase().includes(s)
);
}

let html = "";
let header = "";

/* =========================
👤 AGENT VIEW
========================= */
if(viewMode==="agent"){

header = `<th>Agent</th><th>Wszystko</th><th>✔</th><th>✖</th><th>%</th>`;

let g={};

data.forEach(t=>{
if(!g[t.agent]) g[t.agent]={tasks:[],ok:0,bad:0};
g[t.agent].tasks.push(t);
t.status==="Correct"?g[t.agent].ok++:g[t.agent].bad++;
});

Object.keys(g).forEach(a=>{

let total=g[a].ok+g[a].bad;
let rate=calcRate(g[a].ok,total);

html+=`
<tr onclick="toggle('a-${a}')" style="cursor:pointer">
<td><b>${a}</b></td>
<td>${total}</td>
<td style="color:#1e8e3e">${g[a].ok}</td>
<td style="color:#c0392b">${g[a].bad}</td>
<td class="${color(rate)}">${rate}%</td>
</tr>

<tr id="a-${a}" style="display:none">
<td colspan="5">
`;

g[a].tasks.forEach(t=>{
html+=`
<div>
🧪 Test ${t.test} -
<span class="${t.status==='Correct'?'good':'bad'}">
${t.status}
</span>
 - ${t.task}
</div>`;
});

html+=`</td></tr>`;
});
}

/* =========================
🧪 TEST VIEW
========================= */
if(viewMode==="test"){

header = `<th>Test</th><th>Razem</th><th>✔</th><th>✖</th><th>%</th>`;

let g={};

data.forEach(t=>{
if(!g[t.test]) g[t.test]={tasks:[],ok:0,bad:0};
g[t.test].tasks.push(t);
t.status==="Correct"?g[t.test].ok++:g[t.test].bad++;
});

Object.keys(g).forEach(t=>{

let total=g[t].ok+g[t].bad;
let rate=calcRate(g[t].ok,total);

html+=`
<tr onclick="toggle('t-${t}')" style="cursor:pointer">
<td><b>Test ${t}</b></td>
<td>${total}</td>
<td style="color:#1e8e3e">${g[t].ok}</td>
<td style="color:#c0392b">${g[t].bad}</td>
<td class="${color(rate)}">${rate}%</td>
</tr>

<tr id="t-${t}" style="display:none">
<td colspan="5">
`;

g[t].tasks.forEach(x=>{
html+=`
<div>
👤 ${x.agent} -
<span class="${x.status==='Correct'?'good':'bad'}">
${x.status}
</span>
 - ${x.task}
</div>`;
});

html+=`</td></tr>`;
});
}

/* =========================
🟢 MATRIX VIEW
========================= */
if(viewMode==="matrix"){

let m={};

data.forEach(t=>{
if(!m[t.agent]) m[t.agent]={};
if(!m[t.agent][t.test]) m[t.agent][t.test]={ok:0,total:0};

m[t.agent][t.test].total++;
if(t.status==="Correct") m[t.agent][t.test].ok++;
});

let tests=[...new Set(data.map(t=>t.test))].sort((a,b)=>a-b);

header=`<th>Agent</th>`+tests.map(t=>`<th>Test ${t}</th>`).join("");

Object.keys(m).forEach(a=>{
html+=`<tr><td><b>${a}</b></td>`;

tests.forEach(t=>{
let c=m[a][t];

if(!c){
html+=`<td class="zero">⚪ 0%</td>`;
return;
}

let rate=calcRate(c.ok,c.total);

let dot="🔴";
if(rate>=75) dot="🟢";
else if(rate>=40) dot="🟡";

html+=`<td class="${color(rate)}">${dot} ${rate}%</td>`;
});

html+=`</tr>`;
});
}

document.getElementById("header").innerHTML=header;
document.getElementById("table").innerHTML=html;

}

render();

</script>

</body>
</html>
